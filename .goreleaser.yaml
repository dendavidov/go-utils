version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: jwt-token
    main: ./cmd/jwt-token
    binary: jwt-token
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: jwt-token
    builds:
      - jwt-token
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true

release:
  draft: false
