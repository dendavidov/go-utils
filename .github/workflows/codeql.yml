name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 10 * * 1"

permissions:
  contents: read
  security-events: write
  # analyze step calls the workflow-runs API (telemetry / status); without this
  # GITHUB_TOKEN gets "Resource not accessible by integration".
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: go
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
