name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 10 * * 1"

permissions:
  contents: read
  # write is enough for SARIF upload; satisfies API checks that require this scope
  security-events: write
  # analyze calls the workflow-runs API (telemetry / status)
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: go
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
